name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: pre-commit
        uses: j178/prek-action@v2

      - name: Type check
        run: uv run ty check

      - name: Validate config
        run: uv run nox -s validate_config

      - name: Ensure config-schema.json is up-to-date
        run: uv run nox -s check_schema

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        jj-version: ["v0.42.0", "v0.43.0"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install jj
        env:
          JJ_VERSION: ${{ matrix.jj-version }}
        run: |
          curl -fsSL "https://github.com/jj-vcs/jj/releases/download/${JJ_VERSION}/jj-${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin ./jj
          jj --version

      - name: Tests
        run: uv run nox -p ${{ matrix.python-version }} -s tests
