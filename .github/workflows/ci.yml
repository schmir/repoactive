name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.25"
          cache: false

      - name: pre-commit
        uses: j178/prek-action@v2

      - name: Type check
        run: uv run ty check

      - name: Validate config
        run: uv run nox -s validate-config

      - name: Ensure config-schema.json is up-to-date
        run: uv run nox -s check-schema

  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13", "3.14"]
        jj-version: ["v0.42.0", "v0.43.0"]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Install jj
        env:
          JJ_VERSION: ${{ matrix.jj-version }}
        run: |
          curl -fsSL "https://github.com/jj-vcs/jj/releases/download/${JJ_VERSION}/jj-${JJ_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | sudo tar -xz -C /usr/local/bin ./jj
          jj --version

      - name: Tests
        run: uv run nox -p ${{ matrix.python-version }} -s tests

  docker-smoketest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      # Pre-build the image with GitHub Actions layer caching so the apt and
      # jj-download layers are reused across runs; the nox session then skips
      # its own uncached build.
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          tags: repoactive
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Docker smoke test
        run: uv run nox -s docker-smoketest -- --no-build
