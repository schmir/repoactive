repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-ast
      - id: check-toml
      - id: check-merge-conflict
      - id: trailing-whitespace

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.21
    hooks:
      - id: ruff-check
        args: ["--fix", "--exit-non-zero-on-fix"]
      - id: ruff-format

  - repo: https://github.com/ComPWA/taplo-pre-commit
    rev: v0.9.3
    hooks:
      - id: taplo-format
        name: format toml files with taplo

  - repo: https://github.com/rbubley/mirrors-prettier
    rev: "v3.9.5"
    hooks:
      - id: prettier
        name: run prettier (markdown)
        types_or: [markdown]

  - repo: https://github.com/astral-sh/ty-pre-commit
    rev: v0.0.58
    hooks:
      - id: ty

  - repo: local
    hooks:
      - id: shfmt
        name: shfmt
        description: Run shfmt to format shell scripts
        entry: shfmt -w -i 4
        types: [shell]
        language: golang
        pass_filenames: true
        additional_dependencies: ["mvdan.cc/sh/v3/cmd/shfmt@v3.13.1"]
