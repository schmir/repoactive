"$schema" = "https://raw.githubusercontent.com/schmir/repoactive/refs/heads/main/config-schema.json"

[job-defaults]
branch_prefix = "repoactive/"

# Upgrade every dependency at once in a single MR. Replaced by the per-dependency
# upgrade-deps generator below; kept here (commented out) as the simpler alternative.
# [job.uv-lock-upgrade]
# command = "uv lock --upgrade"
# title = "build: upgrade all dependencies"
# tags = ["weekly"]
# cooldown_period = "14d"

# Generator: emit one "upgrade-<dep>" job per [project.dependencies] entry, each
# running "uv lock -P <dep>". The emitted jobs inherit the tags and cooldown_period
# set here. See docs/adr/0004-job-generators.md.
[job.upgrade-deps]
command = "./scripts/emit-upgrade-jobs.py"
title = "discover per-dependency upgrade jobs"
emits_jobs = true
tags = ["weekly"]
cooldown_period = "14d"

[job.update-flake]
command = "./scripts/update-flake.sh"
title = "build: update flake inputs"
tags = ["weekly"]
cooldown_period = "14d"

[job.prek-autoupdate]
command = "./scripts/prek.sh autoupdate"
title = "ci: update pre-commit hooks"
tags = ["weekly"]
cooldown_period = "14d"

[job.prek-run-all]
command = "sh -c './scripts/prek.sh run -a; true'"
title = "ci: apply pre-commit fixes"
depends_on = ["prek-autoupdate"]
tags = ["weekly"]
